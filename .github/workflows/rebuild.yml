name: Rebuild H-1B dashboard

# Runs automatically whenever you add or change a file in the data/ folder
# (or edit build.py). It regenerates index.html and commits it, which makes
# GitHub Pages redeploy the updated dashboard. You can also start it by hand
# from the Actions tab ("Run workflow").

on:
  push:
    paths:
      - 'data/**'
      - 'build.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl

      - name: Rebuild index.html from data files
        run: python build.py

      - name: Commit the updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes - dashboard already up to date."
          else
            git commit -m "Auto-rebuild dashboard from data/ files"
            git push
          fi
